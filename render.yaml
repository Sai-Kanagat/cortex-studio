# Render blueprint for the Cortex Studio backend.
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo. Then set the two
# secret env vars (GEMINI_API_KEY, CORTEX_PASSCODE) in the dashboard. See docs/deploy.md.
services:
  - type: web
    name: cortex-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .                 # repo root, so brand docs + layout are in the image
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false                  # paste in the Render dashboard, never in git
      - key: CORTEX_PASSCODE
        sync: false                  # e.g. 0000 (set in the dashboard)
      - key: CORTEX_DATA_DIR
        value: /var/data             # persistent disk mount below
      - key: CORTEX_DAILY_RUN_CAP
        value: "5"
      - key: CORTEX_CORS_ORIGINS
        value: https://saikanagat.com,https://www.saikanagat.com
      - key: MAX_CRITIC_LOOPS
        value: "2"
    disk:
      name: cortex-data
      mountPath: /var/data           # generated assets + uploads + vector store persist here
      sizeGB: 1

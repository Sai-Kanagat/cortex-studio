services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cortex:cortex@postgres:5432/cortex
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# Langfuse (observability) is added in M4 to keep the M0/M1 stack light.
# It needs its own postgres + clickhouse; see docs/observability.md when we get there.

volumes:
  pgdata:
